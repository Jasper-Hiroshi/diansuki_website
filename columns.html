  <nav class="site-nav" aria-label="站点导航">
    <div class="site-nav__inner">

        <h2 class="cols__item-title" id="col-left-title">点酥的非严谨民俗小知识</h2>
        <div class="dyn-filters">
          <div class="dyn-date-picker" id="date-picker-left">
            <button class="dyn-filters__input dyn-date-picker__btn" type="button" id="date-picker-btn-left">按日期检索</button>
            <button class="dyn-date-picker__clear" type="button" id="date-picker-clear-left" title="清除日期" hidden>✕</button>
            <div class="dyn-date-picker__drop" id="date-picker-drop-left"></div>
          </div>
          <input class="dyn-filters__input" type="search" id="filter-keyword-left" placeholder="搜索文章…" aria-label="关键词搜索">
        </div>
        <ul class="col-articles" id="col-list-left" aria-label="文章列表">

        </ul>

          <div class="dyn-date-picker" id="date-picker-right">
            <button class="dyn-filters__input dyn-date-picker__btn" type="button" id="date-picker-btn-right">按日期检索</button>
            <div class="dyn-date-picker__drop" id="date-picker-drop-right"></div>
          </div>
          <input class="dyn-filters__input" type="search" id="filter-keyword-right" placeholder="搜索文章…" aria-label="关键词搜索">
        </div>
        <ul class="col-articles" id="col-list-right" aria-label="文章列表">
          <!-- JS 渲染 -->
        </ul>
      </section>
    </div>
  </main>

  <!-- 文章全文 overlay -->
  <div class="article-overlay" id="article-overlay" hidden>
    <div class="article-overlay__header">
      <h2 class="article-overlay__title" id="article-overlay-title"></h2>
      <button class="article-overlay__close" type="button" id="article-overlay-close" title="关闭">✕</button>
    </div>
    <div class="article-overlay__body" id="article-overlay-body"></div>
  </div>

  <div class="page-scroll">
    <button class="page-scroll__btn" type="button" id="scroll-more" aria-label="下一页面" data-next="songs.html">
