<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="點酥Susu 直播日历 — 历史直播归档">
  <title>直播日历 · 點酥き</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/images/logo1.png">
</head>
<body class="body--fixed">
  <nav class="site-nav" aria-label="站点导航">
    <div class="site-nav__inner">
      <a class="site-nav__brand" href="index.html"><span class="text-cn">點酥</span><span class="text-en">き</span></a>
      <ul class="site-nav__list">
        <li><a class="site-nav__link" href="index.html">首页</a></li>
        <li><a class="site-nav__link" href="widgets.html">小组件</a></li>
        <li><a class="site-nav__link" href="fanworks.html">二创</a></li>
        <li><a class="site-nav__link" href="columns.html">专栏</a></li>
        <li><a class="site-nav__link" href="songs.html">歌</a></li>
        <li><a class="site-nav__link site-nav__link--active" href="calendar.html">直播日历</a></li>
      </ul>
    </div>
  </nav>

  <main class="page">
    <h1 class="cal-title">直播日历</h1>

    <section class="cal-card" aria-label="直播日历">
      <div class="dyn-filters">
        <input class="dyn-filters__input" type="search" id="filter-title" placeholder="搜索直播标题…" aria-label="搜索直播标题">
        <select class="dyn-filters__input cal-filter__select" id="filter-topic" aria-label="选题筛选">
          <option value="">全部选题</option>
        </select>
        <select class="dyn-filters__input cal-filter__select" id="filter-category" aria-label="分类筛选">
          <option value="">全部分类</option>
        </select>
        <div class="dyn-date-picker" id="date-picker">
          <button class="dyn-filters__input dyn-date-picker__btn" type="button" id="date-picker-btn">按日期检索</button>
          <div class="dyn-date-picker__drop" id="date-picker-drop"></div>
        </div>
      </div>

      <div class="cal-grid" id="cal-grid" aria-label="日历表格">
        <!-- JS 渲染 -->
      </div>
    </section>
  </main>

  <div class="page-scroll">
    <button class="page-scroll__btn" type="button" id="scroll-more" aria-label="返回首页" data-next="index.html">
      <span class="chevron" aria-hidden="true"></span>
    </button>
  </div>

  <script src="js/calendar-data.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/main.js"></script>
  <script src="js/fab.js"></script>
</body>
</html>
